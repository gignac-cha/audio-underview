name: "Deploy: Database Migrations"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/supabase-connector/migrations/**'

concurrency:
  group: deploy-database-migrations
  cancel-in-progress: false

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    name: Apply database migrations
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Local test (same env vars required):
      #   SUPABASE_ACCESS_TOKEN=<PAT> SUPABASE_PROJECT_ID=<ref> bash -c '<run block>'
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail

          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/migrations"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          applied=$(curl -sf -H "${AUTH}" "${API}" | jq -r '.[].name' | sort -u)

          for file in packages/supabase-connector/migrations/*.sql; do
            filename=$(basename "${file}" .sql)
            name="${filename#*_}"

            if grep -qx "${name}" <<< "${applied}"; then
              echo "skip   ${filename}"
              continue
            fi

            echo "apply  ${filename}"
            body=$(jq -Rs --arg n "${name}" '{name: $n, query: .}' < "${file}")
            if ! curl -sf -X POST -H "${AUTH}" -H "Content-Type: application/json" \
                 -d "${body}" "${API}" > /tmp/response.json; then
              echo "FAIL   ${filename}"
              cat /tmp/response.json
              exit 1
            fi
            echo "done   ${filename}"
          done
